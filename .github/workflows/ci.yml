name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker
        run: docker version

      - name: Run Go Tests
        run: make test

      - name: Run Zot E2E Harness
        run: make test-e2e
